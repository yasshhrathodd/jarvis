<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Your AI Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo-dot"></div>
        <div>
          <h1>JARVIS</h1>
          <p class="tagline">Personal AI assistant — Gmail, Calendar, Web</p>
        </div>
      </div>
      <button id="reset-btn" class="reset-btn" title="Clear conversation">New chat</button>
    </header>

    <main id="messages" class="messages">
      <div class="welcome">
        <h2>Hey Y-Dawg.</h2>
        <p>Ask me about your emails, your schedule, or anything on the web.</p>
        <div class="suggestions">
          <button class="suggestion">What's on my calendar this week?</button>
          <button class="suggestion">Any new emails from professors?</button>
          <button class="suggestion">Latest news on Gemini AI</button>
          <button class="suggestion">Am I free tomorrow at 3pm?</button>
        </div>
      </div>
    </main>

    <form id="chat-form" class="composer">
      <textarea
        id="input"
        placeholder="Ask JARVIS anything..."
        rows="1"
        autocomplete="off"
      ></textarea>
      <button type="submit" id="send-btn" class="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
